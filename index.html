<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Scratchpad</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

  <div class="app-container">
    <header class="toolbar">
      <div class="tool-group">
        <button class="tool-btn" data-command="bold"><b>B</b></button>
        <button class="tool-btn" data-command="italic"><i>I</i></button>
        <button class="tool-btn" data-command="underline"><u>U</u></button>
        <button class="tool-btn" data-command="hiliteColor">🖍️ Highlight</button>
      </div>

      <div class="tool-group">
        <div class="dropdown">
          <button class="tool-btn">😀 Emoji</button>
          <div class="dropdown-content" id="emojiGrid">
            </div>
        </div>

        <label class="tool-btn image-btn">
          🖼️ Image
          <input type="file" id="imageUpload" accept="image/*">
        </label>
      </div>

      <div class="tool-group">
        <button id="exportPdfBtn" class="export-btn">💾 Save PDF</button>
      </div>
    </header>

    <main class="workspace">
      <div id="editor" class="paper" contenteditable="true">
        <h1>Untitled Workspace</h1>
        <p>Start typing your ideas here...</p>
      </div>
    </main>
  </div>

  <script src="editor.js"></script>
</body>
</html>
